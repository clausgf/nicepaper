[project]
name = "epaper-nice"
version = "0.1.0"
description = "Renders screens (e.g. door signs with room calendars) as PNG images for e-paper displays; FastAPI backend with a NiceGUI management UI"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi",
    "nicegui",
    "uvicorn",
    "pydantic",
    "pydantic-settings",
    "pillow",
    "babel",
    "icalendar",
    "recurring-ical-events",
    "aiohttp",
    "aiofiles",
    "python-dateutil",
    "niceview",
]

[dependency-groups]
dev = [
    "pytest",
    "httpx",
]

[tool.uv]
# the app is run from source (uvicorn app.main:app), not installed as a package
package = false

[tool.uv.sources]
# pre-1.0, no PyPI release; uv.lock pins the exact commit (same pattern
# as nice4iot). Re-run 'uv lock -P niceview' to pick up upstream changes.
niceview = { git = "https://github.com/clausgf/niceview.git" }

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
