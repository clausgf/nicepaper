name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Lint with ruff
        run: uv run ruff check

      - name: Create required data directories
        run: mkdir -p data/screens data/schedules data/images data/ical

      - name: Run tests
        run: uv run pytest
